<svg viewBox="0 0 1200 400" width="1200" height="400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">joflux - GitHub org to Forgejo migration workflow</title>
  <desc id="desc">A dark README hero showing joflux as a five-stage GitHub organization to Forgejo migration workflow with inspectable JSON state.</desc>

  <defs>
    <style>
      .sans{font-family:'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;}
      .mono{font-family:'SFMono-Regular','SF Mono','JetBrains Mono','Fira Code','DejaVu Sans Mono',Menlo,Consolas,monospace;}
      .flow{stroke-dasharray:5 9;animation:flow 2.7s linear infinite;}
      .pulse{animation:pulse 4.8s ease-in-out infinite;}
      @keyframes flow{to{stroke-dashoffset:-28;}}
      @keyframes pulse{0%,100%{opacity:.72}50%{opacity:1}}
      @media (prefers-reduced-motion: reduce){.flow,.pulse{animation:none;}}
    </style>

    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5FB2FF" />
      <stop offset="1" stop-color="#2EE6D6" />
    </linearGradient>
    <linearGradient id="fluxGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6FE7E0" />
      <stop offset="1" stop-color="#4DA3FF" />
    </linearGradient>
    <linearGradient id="markGrad" x1="65" y1="92" x2="113" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18A8FF" />
      <stop offset="0.68" stop-color="#4BD8FF" />
      <stop offset="1" stop-color="#79E7E0" />
    </linearGradient>
    <radialGradient id="glowBrand" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4DA3FF" stop-opacity="0.55" />
      <stop offset="1" stop-color="#4DA3FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.38" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#4DA3FF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <clipPath id="round"><rect x="2" y="2" width="1196" height="396" rx="22" /></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="400" fill="#0A0E18" />
    <ellipse cx="150" cy="60" rx="420" ry="320" fill="url(#glowBrand)" opacity="0.5" />
    <ellipse cx="1080" cy="380" rx="520" ry="360" fill="url(#glowCyan)" opacity="0.5" />
    <rect width="1200" height="2" fill="#FFFFFF" opacity="0.05" />
  </g>
  <rect x="2" y="2" width="1196" height="396" rx="22" fill="none" stroke="#1E2A40" stroke-width="1.5" />
  <line x1="500" y1="46" x2="500" y2="354" stroke="#1E2A40" stroke-width="1.5" />

  <g>
    <rect x="54" y="42" width="108" height="26" rx="13" fill="#063042" stroke="#1F6F8E" stroke-width="1.25" />
    <text class="sans" x="68" y="60" font-size="13" fill="#F4F8FF" font-weight="800">NETSPEEDY</text>
  </g>

  <g>
    <rect x="54" y="78" width="70" height="70" rx="16" fill="#0F1626" stroke="#2A3A56" stroke-width="1.25" />
    <rect x="55" y="79" width="68" height="68" rx="15" fill="none" stroke="#4BD8FF" stroke-opacity="0.14" class="pulse" />
    <path d="M71 95h31c7 0 12 5 12 12s-5 12-12 12H86c-6 0-10 5-10 10s4 10 10 10h5" fill="none" stroke="url(#markGrad)" stroke-width="6.5" stroke-linecap="round" opacity="0.62" />
    <path d="M71 95h31c7 0 12 5 12 12s-5 12-12 12H86c-6 0-10 5-10 10s4 10 10 10h5" fill="none" stroke="url(#markGrad)" stroke-width="6.5" stroke-linecap="round" pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100" opacity="0">
      <animate attributeName="stroke-dashoffset" values="100;0;0;100" keyTimes="0;0.68;0.84;1" dur="5.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.08;0.72;0.82;1" dur="5.8s" repeatCount="indefinite" />
    </path>
    <path d="M71 107h18c7 0 12 5 12 12s-5 12-12 12h-3" fill="none" stroke="#F4F8FF" stroke-width="6.5" stroke-linecap="round" opacity="0.92" />
  </g>

  <text class="sans" x="142" y="134" font-size="76" font-weight="800">
    <tspan fill="#4BD8FF">jo</tspan><tspan fill="#E9EFF8">flux</tspan>
  </text>

  <text class="sans" x="54" y="200" font-size="22" font-weight="700" fill="#E9EFF8" letter-spacing="-0.3">GitHub <tspan fill="#4DA3FF" font-weight="600">&#8594;</tspan> Forgejo migration</text>
  <text class="sans" x="54" y="228" font-size="14.5" fill="#8C99B0">Inspectable JSON state for every migration step.</text>
  <line x1="54" y1="252" x2="450" y2="252" stroke="#1E2A40" stroke-width="1.25" />

  <g class="mono" font-size="13" font-weight="600">
    <text x="54" y="282" fill="#22D3EE">export</text>
    <text x="123" y="282" fill="#3A4760">/</text>
    <text x="136" y="282" fill="#34D399">migrate</text>
    <text x="214" y="282" fill="#3A4760">/</text>
    <text x="227" y="282" fill="#818CF8">monitor</text>
    <text x="305" y="282" fill="#3A4760">/</text>
    <text x="318" y="282" fill="#FBBF24">verify</text>
    <text x="381" y="282" fill="#3A4760">/</text>
    <text x="394" y="282" fill="#94A3B8">archive</text>
  </g>

