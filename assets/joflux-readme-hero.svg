    <rect x="54" y="300" width="396" height="64" rx="11" fill="#0C1220" stroke="#22304A" stroke-width="1.25" />
    <rect x="54" y="300" width="396" height="22" rx="11" fill="#FFFFFF" opacity="0.02" />
    <circle cx="71" cy="316" r="4" fill="#FF5F57" />
    <circle cx="85" cy="316" r="4" fill="#FEBC2E" />
    <circle cx="99" cy="316" r="4" fill="#28C840" />
    <text class="mono" x="71" y="348" font-size="12.5">
      <tspan fill="#56627C">$ </tspan><tspan fill="#4DA3FF" font-weight="600">joflux</tspan><tspan fill="#8C99B0"> --config joflux.toml </tspan><tspan fill="#34D399" font-weight="600">migrate</tspan>
    </text>
  </g>

  <g>
    <rect x="510" y="44" width="652" height="312" rx="18" fill="#0E1422" stroke="#1E2A40" stroke-width="1.25" />
