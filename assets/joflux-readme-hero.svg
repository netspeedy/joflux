<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">joflux README hero</title>
  <desc id="desc">A dark Netspeedy-style hero for joflux showing a terminal workflow that migrates GitHub repositories to Forgejo or Codeberg.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111a" />
      <stop offset="0.5" stop-color="#090d13" />
      <stop offset="1" stop-color="#17120a" />
    </linearGradient>
    <radialGradient id="cyan-glow" cx="74%" cy="20%" r="58%">
      <stop offset="0" stop-color="#4bd8ff" stop-opacity="0.32" />
      <stop offset="0.52" stop-color="#4bd8ff" stop-opacity="0.08" />
      <stop offset="1" stop-color="#4bd8ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="amber-glow" cx="18%" cy="98%" r="60%">
      <stop offset="0" stop-color="#f5b841" stop-opacity="0.22" />
      <stop offset="0.56" stop-color="#f5b841" stop-opacity="0.06" />
      <stop offset="1" stop-color="#f5b841" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="mark" x1="17" y1="15" x2="66" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18a8ff" />
      <stop offset="0.58" stop-color="#4bd8ff" />
      <stop offset="1" stop-color="#f5b841" />
    </linearGradient>
    <linearGradient id="flow" x1="500" y1="82" x2="1160" y2="318" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4bd8ff" />
      <stop offset="0.56" stop-color="#18a8ff" />
      <stop offset="1" stop-color="#f5b841" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f4f8ff" stroke-opacity="0.045" stroke-width="1" />
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#18a8ff" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="400" rx="22" fill="url(#bg)" />
  <rect width="1200" height="400" rx="22" fill="url(#cyan-glow)" />
  <rect width="1200" height="400" rx="22" fill="url(#amber-glow)" />
  <rect width="1200" height="400" rx="22" fill="url(#grid)" />

  <g transform="translate(46 34)">
    <rect width="108" height="26" rx="13" fill="#063042" stroke="#1f6f8e" />
    <text x="14" y="18" fill="#f4f8ff" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="800">NETSPEEDY</text>
  </g>

  <g transform="translate(48 78)">
    <rect width="70" height="70" rx="16" fill="#0f1218" stroke="#2d3d52" />
    <path d="M17 17h31c7 0 12 5 12 12s-5 12-12 12H32c-6 0-10 5-10 10s4 10 10 10h5" fill="none" stroke="url(#mark)" stroke-width="6.5" stroke-linecap="round" />
    <path d="M17 29h18c7 0 12 5 12 12s-5 12-12 12h-3" fill="none" stroke="#f4f8ff" stroke-width="6.5" stroke-linecap="round" opacity="0.92" />
  </g>

  <text x="136" y="134" font-family="Inter, Arial, Helvetica, sans-serif" font-size="78" font-weight="800"><tspan fill="#4bd8ff">jo</tspan><tspan fill="#f4f8ff">flux</tspan></text>
  <text x="50" y="180" fill="#e2e8f0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22" font-weight="700">GitHub org to Forgejo migration workflow</text>
  <text x="50" y="210" fill="#aab5c4" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">Inspectable JSON state for every migration step.</text>

  <path d="M50 236H464" stroke="url(#flow)" stroke-width="3" stroke-linecap="round" />
  <g font-family="Fira Code, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
    <text x="50" y="266" fill="#4bd8ff">export</text>
    <text x="113" y="266" fill="#64748b">|</text>
    <text x="134" y="266" fill="#22c55e">migrate</text>
    <text x="213" y="266" fill="#64748b">|</text>
    <text x="234" y="266" fill="#aab5c4">monitor</text>
    <text x="317" y="266" fill="#64748b">|</text>
    <text x="338" y="266" fill="#f4f8ff">verify</text>
    <text x="405" y="266" fill="#64748b">|</text>
    <text x="426" y="266" fill="#f5b841">archive</text>
  </g>

  <g transform="translate(46 292)">
    <rect width="420" height="70" rx="10" fill="#07111a" fill-opacity="0.78" stroke="#2d3d52" />
    <circle cx="18" cy="18" r="4" fill="#ef4444" />
    <circle cx="34" cy="18" r="4" fill="#f5b841" />
    <circle cx="50" cy="18" r="4" fill="#22c55e" />
    <text x="16" y="45" fill="#22c55e" font-family="Fira Code, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">$</text>
    <text x="34" y="45" fill="#f4f8ff" font-family="Fira Code, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">joflux --config joflux.toml monitor &amp;&amp; verify</text>
  </g>

  <g transform="translate(498 32)">
    <rect width="660" height="248" rx="16" fill="#0f1218" fill-opacity="0.76" stroke="#2d3d52" />
    <text x="264" y="23" fill="#aab5c4" font-family="Fira Code, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">joflux - migration run</text>

    <g font-family="Fira Code, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="600">
      <rect x="24" y="38" width="124" height="52" rx="8" fill="#07111a" stroke="#155e75" />
      <text x="52" y="62" fill="#4bd8ff">GitHub org</text>
      <text x="52" y="80" fill="#aab5c4">repo list</text>

      <rect x="24" y="104" width="124" height="52" rx="8" fill="#07111a" stroke="#6d28d9" />
      <text x="52" y="128" fill="#c084fc">JSON state</text>
      <text x="52" y="146" fill="#aab5c4">audit files</text>

      <rect x="24" y="170" width="124" height="52" rx="8" fill="#07111a" stroke="#166534" />
      <text x="52" y="194" fill="#22c55e">Operators</text>
      <text x="52" y="212" fill="#aab5c4">retry safely</text>
    </g>

    <g transform="translate(216 72)" filter="url(#glow)">
      <rect width="108" height="88" rx="12" fill="#061827" stroke="#18a8ff" stroke-width="2" />
      <text x="24" y="42" fill="#4bd8ff" font-family="Fira Code, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="800">joflux</text>
      <text x="24" y="64" fill="#aab5c4" font-family="Inter, Arial, Helvetica, sans-serif" font-size="12">five stages</text>
    </g>

    <g font-family="Fira Code, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
      <rect x="394" y="46" width="232" height="54" rx="9" fill="#07111a" stroke="#155e75" />
      <text x="426" y="77" fill="#4bd8ff">Forgejo target org</text>
      <rect x="394" y="118" width="232" height="54" rx="9" fill="#07111a" stroke="#6d28d9" />
      <text x="426" y="149" fill="#c084fc">Codeberg target org</text>
      <rect x="394" y="190" width="232" height="36" rx="9" fill="#07111a" stroke="#f5b841" />
      <text x="426" y="214" fill="#f5b841">verified repositories</text>
    </g>

    <g fill="none" stroke="url(#flow)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
      <path d="M148 64H184C184 64 184 116 216 116" stroke-dasharray="3 7" />
      <path d="M148 130H184C184 130 184 116 216 116" stroke-dasharray="3 7" />
      <path d="M148 196H184C184 196 184 160 216 160" stroke-dasharray="3 7" />
      <path d="M324 116H370C370 116 370 73 394 73" />
      <path d="M324 116H370C370 116 370 145 394 145" />
      <path d="M324 160H370C370 160 370 208 394 208" />
    </g>
  </g>

  <g transform="translate(498 294)" font-family="Inter, Arial, Helvetica, sans-serif">
    <rect width="126" height="46" rx="10" fill="#07111a" stroke="#155e75" />
    <rect x="138" width="126" height="46" rx="10" fill="#07111a" stroke="#166534" />
    <rect x="276" width="126" height="46" rx="10" fill="#07111a" stroke="#6d28d9" />
    <rect x="414" width="126" height="46" rx="10" fill="#07111a" stroke="#b45309" />
    <rect x="552" width="108" height="46" rx="10" fill="#07111a" stroke="#155e75" />
    <text x="42" y="23" fill="#4bd8ff" font-size="12" font-weight="800">export</text>
    <text x="36" y="36" fill="#aab5c4" font-size="10">inventory</text>
    <text x="180" y="23" fill="#22c55e" font-size="12" font-weight="800">migrate</text>
    <text x="174" y="36" fill="#aab5c4" font-size="10">imports</text>
    <text x="318" y="23" fill="#c084fc" font-size="12" font-weight="800">monitor</text>
    <text x="318" y="36" fill="#aab5c4" font-size="10">progress</text>
    <text x="456" y="23" fill="#f5b841" font-size="12" font-weight="800">verify</text>
    <text x="448" y="36" fill="#aab5c4" font-size="10">metadata</text>
    <text x="584" y="23" fill="#4bd8ff" font-size="12" font-weight="800">archive</text>
    <text x="586" y="36" fill="#aab5c4" font-size="10">source</text>
  </g>
</svg>
