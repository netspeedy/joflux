      <circle cx="668" cy="159" r="13" fill="#0E1422" stroke="#22D3EE" stroke-width="2" />
      <text class="mono" x="668" y="163.5" text-anchor="middle" font-size="12" font-weight="700" fill="#22D3EE">1</text>
    </g>
    <g>
      <text class="mono" x="747.5" y="122" text-anchor="middle" font-size="9.5" fill="#56627C">imports</text>
      <text class="mono" x="747.5" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#34D399">migrate</text>
      <circle cx="747.5" cy="159" r="13" fill="#0E1422" stroke="#34D399" stroke-width="2" />
      <text class="mono" x="747.5" y="163.5" text-anchor="middle" font-size="12" font-weight="700" fill="#34D399">2</text>
    </g>
    <g>
      <text class="mono" x="827" y="122" text-anchor="middle" font-size="9.5" fill="#56627C">progress</text>
      <text class="mono" x="827" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#818CF8">monitor</text>
      <circle cx="827" cy="159" r="13" fill="#0E1422" stroke="#818CF8" stroke-width="2" />
      <text class="mono" x="827" y="163.5" text-anchor="middle" font-size="12" font-weight="700" fill="#818CF8">3</text>
    </g>
    <g>
      <text class="mono" x="906.5" y="122" text-anchor="middle" font-size="9.5" fill="#56627C">metadata</text>
      <text class="mono" x="906.5" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FBBF24">verify</text>
      <circle cx="906.5" cy="159" r="13" fill="#0E1422" stroke="#FBBF24" stroke-width="2" />
      <text class="mono" x="906.5" y="163.5" text-anchor="middle" font-size="12" font-weight="700" fill="#FBBF24">4</text>
    </g>
    <g>
      <text class="mono" x="986" y="122" text-anchor="middle" font-size="9.5" fill="#56627C">source</text>
      <text class="mono" x="986" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#94A3B8">archive</text>
      <circle cx="986" cy="159" r="13" fill="#0E1422" stroke="#94A3B8" stroke-width="2" />
      <text class="mono" x="986" y="163.5" text-anchor="middle" font-size="12" font-weight="700" fill="#94A3B8">5</text>
    </g>

    <line x1="999" y1="159" x2="1028" y2="159" stroke="#274064" stroke-width="2" />
    <line class="flow" x1="999" y1="159" x2="1030" y2="159" stroke="#4DA3FF" stroke-width="2" marker-end="url(#arrow)" />

    <g>
      <rect x="1032" y="132" width="104" height="32" rx="9" fill="#101A2E" stroke="#3D7DCF" stroke-width="1.4" />
      <circle cx="1048" cy="148" r="3.5" fill="#4DA3FF" />
      <text class="mono" x="1059" y="152.5" font-size="12" font-weight="700" fill="#E9EFF8">Forgejo</text>
    </g>
    <g>
      <rect x="1032" y="170" width="104" height="32" rx="9" fill="#121A2B" stroke="#2B3A56" stroke-width="1.25" />
      <circle cx="1048" cy="186" r="3.5" fill="#56627C" />
      <text class="mono" x="1059" y="190.5" font-size="12" font-weight="600" fill="#8C99B0">Codeberg</text>
    </g>
    <g>
      <rect x="1058" y="110" width="78" height="20" rx="10" fill="#0F1F19" stroke="#1F5C42" stroke-width="1.1" />
      <path d="M1067 120l3 3l5.5 -6" fill="none" stroke="#34D399" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      <text class="mono" x="1080" y="123.5" font-size="10" fill="#34D399" font-weight="600">verified</text>
    </g>

    <g stroke="#2B3A56" stroke-width="1.5" stroke-linecap="round">
      <line x1="668" y1="173" x2="668" y2="218" />
      <line x1="747.5" y1="173" x2="747.5" y2="218" />
      <line x1="827" y1="173" x2="827" y2="218" />
      <line x1="906.5" y1="173" x2="906.5" y2="218" />
      <line x1="986" y1="173" x2="986" y2="218" />
    </g>
    <line x1="668" y1="218" x2="986" y2="218" stroke="#2B3A56" stroke-width="1.5" stroke-linecap="round" />
    <line x1="827" y1="218" x2="827" y2="232" stroke="#2B3A56" stroke-width="1.5" stroke-linecap="round" />
    <g fill="#56627C">
      <circle cx="668" cy="173" r="2" />
      <circle cx="747.5" cy="173" r="2" />
      <circle cx="827" cy="173" r="2" />
      <circle cx="906.5" cy="173" r="2" />
      <circle cx="986" cy="173" r="2" />
    </g>

    <g>
      <rect x="762" y="232" width="130" height="34" rx="9" fill="#101725" stroke="#2F4163" stroke-width="1.25" />
      <path d="M779 242h9l4 4v8a1.5 1.5 0 0 1 -1.5 1.5h-11.5a1.5 1.5 0 0 1 -1.5 -1.5v-10.5a1.5 1.5 0 0 1 1.5 -1.5z" fill="none" stroke="#79E7E0" stroke-width="1.3" stroke-linejoin="round" />
      <text class="mono" x="800" y="253.5" font-size="12.5" font-weight="600" fill="#E9EFF8">state.json</text>
    </g>
    <text class="mono" x="827" y="284" text-anchor="middle" font-size="10.5" fill="#56627C">inspectable audit written after every stage</text>

    <line x1="532" y1="312" x2="1138" y2="312" stroke="#1A2438" stroke-width="1" />
    <text class="mono" x="532" y="336" font-size="10.5" fill="#3F4C66">idempotent - resumable - dry-run safe</text>
    <text class="mono" x="1138" y="336" text-anchor="end" font-size="10.5" fill="#3F4C66">github.com/netspeedy/joflux</text>
  </g>
