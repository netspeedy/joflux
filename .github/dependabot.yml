version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: daily
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pip
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - python
