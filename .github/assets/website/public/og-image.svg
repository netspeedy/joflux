<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">joflux social preview</title>
  <desc id="desc">joflux share card with the wordmark, tagline, and five-stage migration flow on a dark terminal background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1218" />
      <stop offset="0.52" stop-color="#101A26" />
      <stop offset="1" stop-color="#17120A" />
    </linearGradient>
    <radialGradient id="glow" cx="120" cy="90" r="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18A8FF" stop-opacity="0.34" />
      <stop offset="1" stop-color="#18A8FF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="flow" x1="150" y1="150" x2="1030" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18A8FF" />
      <stop offset="0.52" stop-color="#4BD8FF" />
      <stop offset="1" stop-color="#F5B841" />
    </linearGradient>
    <linearGradient id="word" x1="232" y1="96" x2="560" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4BD8FF" />
      <stop offset="0.6" stop-color="#F4F8FF" />
      <stop offset="1" stop-color="#F5B841" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#AAB5C4" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <rect x="72" y="72" width="1056" height="486" rx="24" fill="#111722" fill-opacity="0.7" stroke="#2D3D52" />

  <g transform="translate(112 104)">
    <rect width="92" height="92" rx="20" fill="#0F1218" stroke="#2D3D52" />
    <path d="M17 17h28c6 0 11 5 11 11s-5 11-11 11H30c-5 0-9 4-9 9s4 9 9 9h4" fill="none" stroke="url(#flow)" stroke-width="7" stroke-linecap="round" />
    <path d="M17 28h16c6 0 11 5 11 11S39 50 33 50h-3" fill="none" stroke="#F4F8FF" stroke-width="7" stroke-linecap="round" opacity="0.9" />
  </g>

  <text x="232" y="150" fill="url(#word)" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="800">joflux</text>
  <text x="236" y="205" fill="#AAB5C4" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="500">A repeatable CLI workflow for GitHub to Forgejo migrations.</text>

  <path d="M150 372 C 300 270, 430 276, 560 372 S 800 474, 1040 332" fill="none" stroke="url(#flow)" stroke-width="14" stroke-linecap="round" opacity="0.9" />

  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="25" font-weight="600">
    <rect x="128" y="404" width="944" height="100" rx="16" fill="#07111A" stroke="#2D3D52" />
    <text x="160" y="448" fill="#F5B841">$ joflux</text>
    <text x="296" y="448" fill="#4BD8FF">export</text>
    <text x="430" y="448" fill="#AAB5C4">migrate</text>
    <text x="572" y="448" fill="#AAB5C4">monitor</text>
    <text x="722" y="448" fill="#F4F8FF">verify</text>
    <text x="848" y="448" fill="#AAB5C4">archive</text>
    <text x="160" y="484" fill="#748194">JSON state at every step &#8212; inspect, retry, keep the audit trail.</text>
  </g>
</svg>
