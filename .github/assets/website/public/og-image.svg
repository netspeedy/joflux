<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="og-title og-desc">
  <title id="og-title">joflux share image</title>
  <desc id="og-desc">A branded dark share card for joflux, showing a five-stage GitHub organization to Forgejo migration workflow and inspectable JSON state.</desc>

  <defs>
