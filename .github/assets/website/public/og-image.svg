<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">joflux social preview</title>
  <desc id="desc">joflux migration workflow preview with a terminal-style flow.</desc>
  <defs>
