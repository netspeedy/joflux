      <stop offset="0.68" stop-color="#4BD8FF" />
      <stop offset="1" stop-color="#79E7E0" />
    </linearGradient>
    <linearGradient id="flow" x1="580" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
